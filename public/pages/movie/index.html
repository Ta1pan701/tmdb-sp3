<header class="header"></header>
<section class="hero">
  <div class="bg-box"></div>
  <div class="bg-gradient"></div>
  <div class="container movie-cn">
    <div class="overhide hide">
      <div class="search-container">
        <a href="/" class="serch-logo-title"><img src="https://kinoarea.com/front/img/logo-icon.svg" width="30px"
            height="30px" alt="">Kino<span>area</span></a>
        <input type="text" placeholder="Search" class="search-content" id="search-content" name="searching">
        <div class="search-box">
          <button class="search-btn">🔍</button>
          <img src="https://kinoarea.com/front/img/icons/close-menu.svg" alt="" class="close-search-window">
        </div>
        <div class="search-type-box">
          <div class="type" id="movie">Movies</div>
          <div class="type" id="tv">TV</div>
          <div class="type" id="person">People</div>
        </div>
      </div>
      <div class="render-box">
      </div>
    </div>
  </div>
  <div class="acthors-box">
    <h1 class="act-title title">Starring</h1>
  </div>
  <div class="acthors-render">
  </div>
  <div class="new-trailers container">
    <div class="new-tariler-up-box">
      <h1 class="trailer-title title">New trailers</h1>
    </div>

    <div class="new-trailer-video">
      <iframe width="100%" height="617" src="https://www.youtube.com/embed/lcvUGs3xaDM?si=xGUQp_Nz25tvCwV6"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
  </div>
  <div class="poster-container container">
    <h1 class="title">Movie posters</h1>
    <div class="posters-box"></div>
  </div>
  <div class="photo-container container">

    <div class="photos">
      <h1 class="photos-title title">
        Photos from the movie
      </h1>
      <div class="photos-render">
      </div>
    </div>
  </div>
</section>
<section class="newsletter">
        <div class="newsletter__overlay">
            <div class="newsletter__box">

                <div class="newsletter__logo">
                    <span>Kino</span>area
                </div>

                <h2>Subscribe for free E-mail newsletter</h2>

                <p>
                    If you want to keep up to date with the latest movie news,
                    fill out the form below and sign up for the free E-mail newsletter!
                </p>

                <form class="newsletter__form">
                    <input type="email" placeholder="Enter your E-mail address">
                    <button>Subscribe</button>
                </form>

                <label class="newsletter__agree">
                    <input type="checkbox" checked>
                    I agree to the terms <a href="#">privacy policies</a>
                </label>

            </div>
        </div>
    </section>
<footer class="footer"></footer>
